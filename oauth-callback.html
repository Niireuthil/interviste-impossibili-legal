<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TikTok OAuth callback</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>body{font-family:-apple-system,Helvetica,Arial,sans-serif;max-width:700px;margin:40px auto;padding:0 20px;line-height:1.6;color:#222}
textarea{width:100%;height:80px;font-family:monospace;font-size:14px}</style>
</head>
<body>
<h1>TikTok authorization complete</h1>
<p>Copy the value below and send it back:</p>
<textarea id="out" readonly></textarea>
<script>
const params = new URLSearchParams(window.location.search);
const code = params.get("code") || "(no code found in URL — check for an 'error' param instead)";
const error = params.get("error");
document.getElementById("out").value = error ? ("ERROR: " + error + " — " + (params.get("error_description") || "")) : code;
</script>
</body>
</html>
